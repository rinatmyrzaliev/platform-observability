apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: slo-catalog
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: sloth-slo-sli-recordings-catalog-availability
    rules:
    - record: slo:sli_error:ratio_rate5m
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service",status=~"5.."}[5m])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[5m])))
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        sloth_window: 5m
        tier: "2"
    - record: slo:sli_error:ratio_rate30m
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service",status=~"5.."}[30m])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[30m])))
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        sloth_window: 30m
        tier: "2"
    - record: slo:sli_error:ratio_rate1h
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service",status=~"5.."}[1h])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[1h])))
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        sloth_window: 1h
        tier: "2"
    - record: slo:sli_error:ratio_rate2h
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service",status=~"5.."}[2h])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[2h])))
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        sloth_window: 2h
        tier: "2"
    - record: slo:sli_error:ratio_rate6h
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service",status=~"5.."}[6h])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[6h])))
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        sloth_window: 6h
        tier: "2"
    - record: slo:sli_error:ratio_rate1d
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service",status=~"5.."}[1d])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[1d])))
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        sloth_window: 1d
        tier: "2"
    - record: slo:sli_error:ratio_rate3d
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service",status=~"5.."}[3d])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[3d])))
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        sloth_window: 3d
        tier: "2"
    - record: slo:sli_error:ratio_rate30d
      expr: |
        sum_over_time(slo:sli_error:ratio_rate5m{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"}[30d])
        / ignoring (sloth_window)
        count_over_time(slo:sli_error:ratio_rate5m{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"}[30d])
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        sloth_window: 30d
        tier: "2"
  - name: sloth-slo-meta-recordings-catalog-availability
    rules:
    - record: slo:objective:ratio
      expr: vector(0.9990000000000001)
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        tier: "2"
    - record: slo:error_budget:ratio
      expr: vector(1-0.9990000000000001)
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        tier: "2"
    - record: slo:time_period:days
      expr: vector(30)
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        tier: "2"
    - record: slo:current_burn_rate:ratio
      expr: |
        slo:sli_error:ratio_rate5m{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"}
        / on(sloth_id, sloth_slo, sloth_service) group_left
        slo:error_budget:ratio{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"}
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        tier: "2"
    - record: slo:period_burn_rate:ratio
      expr: |
        slo:sli_error:ratio_rate30d{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"}
        / on(sloth_id, sloth_slo, sloth_service) group_left
        slo:error_budget:ratio{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"}
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        tier: "2"
    - record: slo:period_error_budget_remaining:ratio
      expr: 1 - slo:period_burn_rate:ratio{sloth_id="catalog-availability", sloth_service="catalog",
        sloth_slo="availability"}
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_service: catalog
        sloth_slo: availability
        tier: "2"
    - record: sloth_slo_info
      expr: vector(1)
      labels:
        owner: platform-eng
        sloth_id: catalog-availability
        sloth_mode: cli-gen-prom
        sloth_objective: "99.9"
        sloth_service: catalog
        sloth_slo: availability
        sloth_spec: prometheus/v1
        sloth_version: 0.16.0
        tier: "2"
  - name: sloth-slo-alerts-catalog-availability
    rules:
    - alert: CatalogAvailabilityBurnRate
      expr: |
        (
            max(slo:sli_error:ratio_rate5m{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"} > (14.4 * 0.0009999999999999432)) without (sloth_window)
            and
            max(slo:sli_error:ratio_rate1h{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"} > (14.4 * 0.0009999999999999432)) without (sloth_window)
        )
        or
        (
            max(slo:sli_error:ratio_rate30m{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"} > (6 * 0.0009999999999999432)) without (sloth_window)
            and
            max(slo:sli_error:ratio_rate6h{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"} > (6 * 0.0009999999999999432)) without (sloth_window)
        )
      labels:
        category: availability
        severity: critical
        sloth_severity: page
      annotations:
        summary: Catalog service error budget burn rate is too high
        title: (page) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget
          burn rate is too fast.
    - alert: CatalogAvailabilityBurnRate
      expr: |
        (
            max(slo:sli_error:ratio_rate2h{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"} > (3 * 0.0009999999999999432)) without (sloth_window)
            and
            max(slo:sli_error:ratio_rate1d{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"} > (3 * 0.0009999999999999432)) without (sloth_window)
        )
        or
        (
            max(slo:sli_error:ratio_rate6h{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"} > (1 * 0.0009999999999999432)) without (sloth_window)
            and
            max(slo:sli_error:ratio_rate3d{sloth_id="catalog-availability", sloth_service="catalog", sloth_slo="availability"} > (1 * 0.0009999999999999432)) without (sloth_window)
        )
      labels:
        category: availability
        severity: warning
        sloth_severity: ticket
      annotations:
        summary: Catalog service error budget burn rate is too high
        title: (ticket) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget
          burn rate is too fast.
  - name: sloth-slo-sli-recordings-catalog-latency
    rules:
    - record: slo:sli_error:ratio_rate5m
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[5m])) - sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{exported_service="catalog-service",le="0.5"}[5m])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[5m])))
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        sloth_window: 5m
        tier: "2"
    - record: slo:sli_error:ratio_rate30m
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[30m])) - sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{exported_service="catalog-service",le="0.5"}[30m])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[30m])))
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        sloth_window: 30m
        tier: "2"
    - record: slo:sli_error:ratio_rate1h
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[1h])) - sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{exported_service="catalog-service",le="0.5"}[1h])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[1h])))
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        sloth_window: 1h
        tier: "2"
    - record: slo:sli_error:ratio_rate2h
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[2h])) - sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{exported_service="catalog-service",le="0.5"}[2h])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[2h])))
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        sloth_window: 2h
        tier: "2"
    - record: slo:sli_error:ratio_rate6h
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[6h])) - sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{exported_service="catalog-service",le="0.5"}[6h])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[6h])))
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        sloth_window: 6h
        tier: "2"
    - record: slo:sli_error:ratio_rate1d
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[1d])) - sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{exported_service="catalog-service",le="0.5"}[1d])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[1d])))
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        sloth_window: 1d
        tier: "2"
    - record: slo:sli_error:ratio_rate3d
      expr: |
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[3d])) - sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{exported_service="catalog-service",le="0.5"}[3d])))
        /
        (sum(rate(nginx_ingress_controller_requests{exported_service="catalog-service"}[3d])))
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        sloth_window: 3d
        tier: "2"
    - record: slo:sli_error:ratio_rate30d
      expr: |
        sum_over_time(slo:sli_error:ratio_rate5m{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"}[30d])
        / ignoring (sloth_window)
        count_over_time(slo:sli_error:ratio_rate5m{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"}[30d])
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        sloth_window: 30d
        tier: "2"
  - name: sloth-slo-meta-recordings-catalog-latency
    rules:
    - record: slo:objective:ratio
      expr: vector(0.99)
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        tier: "2"
    - record: slo:error_budget:ratio
      expr: vector(1-0.99)
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        tier: "2"
    - record: slo:time_period:days
      expr: vector(30)
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        tier: "2"
    - record: slo:current_burn_rate:ratio
      expr: |
        slo:sli_error:ratio_rate5m{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"}
        / on(sloth_id, sloth_slo, sloth_service) group_left
        slo:error_budget:ratio{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"}
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        tier: "2"
    - record: slo:period_burn_rate:ratio
      expr: |
        slo:sli_error:ratio_rate30d{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"}
        / on(sloth_id, sloth_slo, sloth_service) group_left
        slo:error_budget:ratio{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"}
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        tier: "2"
    - record: slo:period_error_budget_remaining:ratio
      expr: 1 - slo:period_burn_rate:ratio{sloth_id="catalog-latency", sloth_service="catalog",
        sloth_slo="latency"}
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_service: catalog
        sloth_slo: latency
        tier: "2"
    - record: sloth_slo_info
      expr: vector(1)
      labels:
        owner: platform-eng
        sloth_id: catalog-latency
        sloth_mode: cli-gen-prom
        sloth_objective: "99"
        sloth_service: catalog
        sloth_slo: latency
        sloth_spec: prometheus/v1
        sloth_version: 0.16.0
        tier: "2"
  - name: sloth-slo-alerts-catalog-latency
    rules:
    - alert: CatalogLatencyBurnRate
      expr: |
        (
            max(slo:sli_error:ratio_rate5m{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"} > (14.4 * 0.01)) without (sloth_window)
            and
            max(slo:sli_error:ratio_rate1h{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"} > (14.4 * 0.01)) without (sloth_window)
        )
        or
        (
            max(slo:sli_error:ratio_rate30m{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"} > (6 * 0.01)) without (sloth_window)
            and
            max(slo:sli_error:ratio_rate6h{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"} > (6 * 0.01)) without (sloth_window)
        )
      labels:
        category: latency
        severity: critical
        sloth_severity: page
      annotations:
        summary: Catalog service latency budget burn rate is too high
        title: (page) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget
          burn rate is too fast.
    - alert: CatalogLatencyBurnRate
      expr: |
        (
            max(slo:sli_error:ratio_rate2h{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"} > (3 * 0.01)) without (sloth_window)
            and
            max(slo:sli_error:ratio_rate1d{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"} > (3 * 0.01)) without (sloth_window)
        )
        or
        (
            max(slo:sli_error:ratio_rate6h{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"} > (1 * 0.01)) without (sloth_window)
            and
            max(slo:sli_error:ratio_rate3d{sloth_id="catalog-latency", sloth_service="catalog", sloth_slo="latency"} > (1 * 0.01)) without (sloth_window)
        )
      labels:
        category: latency
        severity: warning
        sloth_severity: ticket
      annotations:
        summary: Catalog service latency budget burn rate is too high
        title: (ticket) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget
          burn rate is too fast.
